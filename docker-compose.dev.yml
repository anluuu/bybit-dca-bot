services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dca
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: dca_bot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dca -d dca_bot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Copy Trader (Telegram listener — F0, no execution) ----
  copy-trader:
    build:
      context: .
      dockerfile: apps/copy-trader/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://dca:devpassword@postgres:5432/dca_bot
      TELEGRAM_API_ID: ${COPY_TG_API_ID}
      TELEGRAM_API_HASH: ${COPY_TG_API_HASH}
      TELEGRAM_SESSION_STRING: ${COPY_TG_SESSION_STRING}
      SIGNAL_CHANNEL_ID: ${COPY_TG_CHANNEL_ID}
      TELEGRAM_NOTIFY_BOT_TOKEN: ${COPY_NOTIFY_BOT_TOKEN}
      TELEGRAM_NOTIFY_CHAT_ID: ${COPY_NOTIFY_CHAT_ID}
      JWT_SECRET: dev-jwt-secret-min-32-chars-long
      PORT: 3001
      NODE_ENV: development
      LOG_LEVEL: debug
      BOOT_RECONCILE_LIMIT: 50
      REDIS_URL: redis://redis:6379
      BYBIT_API_KEY: ${COPY_BYBIT_API_KEY:-}
      BYBIT_API_SECRET: ${COPY_BYBIT_API_SECRET:-}
      BYBIT_TESTNET: ${COPY_BYBIT_TESTNET:-true}
      INITIAL_CAPITAL_USDT_OVERRIDE: ${COPY_INITIAL_CAPITAL_USDT_OVERRIDE:-0}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  pgdata:
  redisdata:
