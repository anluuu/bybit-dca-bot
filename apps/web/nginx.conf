server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS so nginx re-resolves the bot hostname at
    # runtime instead of caching the container IP at worker startup. Without
    # this, a rolling redeploy of the bot leaves nginx pointing at a dead
    # IP → 502 for /api/* and /health until web is restarted.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Cache static assets aggressively (Vite produces hashed filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy API + health to the bot service.
    # The `set` + variable pattern forces nginx to re-resolve the hostname
    # on each request via the resolver above.
    location /api/ {
        set $bot_upstream "http://bot:3000";
        proxy_pass $bot_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # Proxy copy-trader API
    location /api/copy/ {
        set $copy_upstream "http://copy-trader:3001";
        proxy_pass $copy_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    location /health {
        set $bot_upstream "http://bot:3000";
        proxy_pass $bot_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # SPA: serve index.html for any unmatched route
    location / {
        try_files $uri $uri/ /index.html;
    }
}
