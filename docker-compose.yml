services:
  # ---- Bot (Fastify + BullMQ + Drizzle) - internal only ----
  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgres://dca:${POSTGRES_PASSWORD}@postgres:5432/dca_bot
      REDIS_URL: redis://redis:6379
      BYBIT_API_KEY: ${BYBIT_API_KEY}
      BYBIT_API_SECRET: ${BYBIT_API_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      BUY_AMOUNT_BRL: ${BUY_AMOUNT_BRL:-250}
      MONTHLY_CAP_BRL: ${MONTHLY_CAP_BRL:-1000}
      CRON_SCHEDULE: ${CRON_SCHEDULE:-0 8 * * 0}
      LIMIT_DISCOUNT_PCT: ${LIMIT_DISCOUNT_PCT:-0.3}
      LIMIT_WAIT_MINUTES: ${LIMIT_WAIT_MINUTES:-120}
      TRADING_PAIR: ${TRADING_PAIR:-BTCBRL}
      PORT: 3000
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - dokploy-network
    restart: unless-stopped

  # ---- Web (React SPA via nginx) - public via Traefik ----
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      bot:
        condition: service_healthy
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      # HTTPS router (serves the app over TLS with Let's Encrypt cert)
      - "traefik.http.routers.dca-bot-web.rule=Host(`dca-bot.luancunha.dev`)"
      - "traefik.http.routers.dca-bot-web.entrypoints=websecure"
      - "traefik.http.routers.dca-bot-web.tls.certResolver=letsencrypt"
      - "traefik.http.services.dca-bot-web.loadbalancer.server.port=80"
      # HTTP router (required for ACME HTTP-01 challenge; also redirects visitors to HTTPS)
      - "traefik.http.routers.dca-bot-web-http.rule=Host(`dca-bot.luancunha.dev`)"
      - "traefik.http.routers.dca-bot-web-http.entrypoints=web"
      - "traefik.http.routers.dca-bot-web-http.middlewares=dca-bot-redirect-to-https"
      - "traefik.http.middlewares.dca-bot-redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.dca-bot-redirect-to-https.redirectscheme.permanent=true"
    networks:
      - dokploy-network
    restart: unless-stopped

  # ---- Postgres ----
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dca
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: dca_bot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dca -d dca_bot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dokploy-network
    restart: unless-stopped

  # ---- Redis (BullMQ queue + AOF persistence) ----
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dokploy-network
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:

networks:
  dokploy-network:
    external: true
